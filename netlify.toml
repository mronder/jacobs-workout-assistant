[build]
  command = "npm run build"
  publish = "dist"
  ignore = "true"

[build.environment]
  NODE_VERSION = "20"

# Edge Functions handle /api/* routes (configured via export const config in each file).
# Edge Functions have a 50-second timeout — enough for OpenAI streaming responses.
# No redirects needed for /api/* since Edge Functions intercept them directly.

# SPA fallback — all non-API routes serve index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
